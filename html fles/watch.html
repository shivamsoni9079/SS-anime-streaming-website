<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS files/global.css">
    <link rel="stylesheet" href="../CSS files/home.css">
    <link rel="stylesheet" href="../CSS files/watch.css">
    <title>Watch Page</title>
</head>
<body>
     <div id="navbar-container"></div>

             <section class="watch-anime">

        <div class="anime-eps">
             <p class="eps">Trailer</p>
        </div>


        <div class="anime-video" id="animeVideo">
                     <p class="loading">Loading Anime Video...</p>
        </div>

        <div class="anime-content" id="animeContent">
            <p class="loading">Loading Anime Details...</p>
        </div>
         
    </section>

   
    <div class="share-buttons-icons">

        <div class="f-l">
            <div class="share-icon">
               <img src="../images/fang yuan lotus.jpg" alt="share">
        </div>
         <div class="share-text">
             <span>Share SS!anime</span>
             <p>to your friends</p>
        </div>

        </div>
        
       
         <div class="share-options-container">
            <a href="https://www.facebook.com" id="facebook-share-link" class="share-option-link">
                <img src="../images/icons8-facebook-logo-48.png" alt="facebook icon" id="facebook-icon" class="share-option">
            </a>
            <a href="https://web.telegram.org" id="telegram-share-link" class="share-option-link">
                 <img src="../images/icons8-telegram-48.png" alt="telegram icon" id="telegram-icon" class="share-option">
            </a>

            <a href="https://www.reddit.com" id="reddit-share-link" class="share-option-link">
                  <img src="../images/reddit.png" alt="reddit icon" id="reddit-icon" class="share-option">
            </a>

            <a href="https://x.com" id="twitter-share-link" class="share-option-link">
                <img src="../images/icons8-twitter-circled-48.png" alt="twitter icon" id="twitter-icon" class="share-option">
            </a>        
        </div>

    </div>
 

      <!-- main wrapper -->
             <div class="main-wrapper">

            <!-- main content -->

                 <div class="main-content">


    <section class="anime-section">
                         <h2 class="section-heading" id="animeHeading">Loading...</h2>

                         <div class="anime-grid" id="animeList">

                            <p class="loading">
                                 Loading...
                            </p>

                           
                         </div>
                         
                         <div id="anime-page"></div>
                    </section>

                 </div>

                      <!-- side bar -->
               <div class="side-bar">
                    <section class="genres-section">
                        <h2 class="section-heading">Genres</h2>
                        <div class="genres">
                    <div class="genres-container" id="genresContainer"></div>
                        <div class="genre-btn-box">
                                  <button class="show-more-genre-btn" id="showMoreBtn">
                                    Show More +
                                  </button>
                        </div>
                        </div>
                      
                    </section>
                    <section class="anime-section">
                        <h2 class="section-heading">Most Viewed</h2>
                        <ul class="most-viewed-anime-ul" id="mostViewedAnime"></ul>
                    </section>

                 </div>
                 
             </div>

    <footer class="footer">
         <div id="ssanime-logo">
            <h1>SS!<span>anime</span></h1>
        </div>

      <p class="copyright-message">&copy SS!anime. All rights reserved.</p>
    </footer>


                    <script src="../Js-files/global.js"></script>
                    <script src="../Js-files/anime-list.js"> </script>
                    <script src="../Js-files/watch.js"></script>
</body>
</html>
